<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUDs - Product Management</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>CRUDs</h1>
            <h3>Product Management System</h3>
        </div>
        <div class="form">
            <input type="text" id="title" placeholder="Title" required>
            <div class="price-group">
                <input type="number" id="price" placeholder="Price" oninput="getPrice()" required>
                <input type="number" id="taxes" placeholder="Taxes" oninput="getPrice()">
                <input type="number" id="ads" placeholder="Ads" oninput="getPrice()">
                <input type="number" id="discount" placeholder="Discount" oninput="getPrice()">
                <button id="total" disabled>Total: </button>
            </div>
            <input type="number" id="count" placeholder="Count" min="1" value="1">
            <input type="text" id="category" placeholder="Category" required>
            <button id="create-btn">Create</button>
        </div>
        <div class="search-section">
            <input onkeyup="searchData(this.value)" type="text" id="search" placeholder="Search">
            <div class="search-buttons">
                <button onclick="searchModeData('search-title')">Search By Title</button>
                <button onclick="searchModeData('search-category')">Search By Category</button>
                <button id="delete-all"></button>
            </div>
        </div>
        <!-- <div id="search-buttons">
            <button id="delete-all">Delete All</button>
        </div> -->
        <div class="output">
            <table id="products-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Price</th>
                        <th>Taxes</th>
                        <th>Ads</th>
                        <th>Discount</th>
                        <th>Total</th>
                        <th>Category</th>
                        <th>Count</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tbody"></tbody>
            </table>
            <div class="cards" id="cards"></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
