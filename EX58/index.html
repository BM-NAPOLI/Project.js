<style>

        height: 100px;

        display: inline-block;

        background-color: red;

    #red:hover{

    }
    #bleu{
        background-color: blue;

    }
    #black{
        background-color: black;
    }
    #black:hover{
        background-color: rgb(15, 12, 12);
    }
    #pink{
        background-color: pink;;
    }
    #pink:hover{
        background-color: rgb(255, 126, 169);
    }
</style>
<body>
    <div onmouseover="chengBkCol(this.id)" id="red"></div>
    <div onmouseover="chengBkCol(this.id)" id="blue"></div>
    <div onmouseover="chengBkCol(this.id)" id="black"></div>
    <div onmouseover="chengBkCol(this.id)" id="pink"></div>
